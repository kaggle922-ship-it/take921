<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Professional Website</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f4f4;
color:#333;
}

header{
background:#111;
color:white;
padding:20px 10%;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-weight:bold;
}

.hero{
height:70vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(120deg,#4facfe,#00f2fe);
color:white;
}

.hero h1{
font-size:50px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
}

section{
padding:80px 10%;
background:white;
margin-bottom:20px;
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#fafafa;
padding:30px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
}
</style>
</head>

<body>

<header>
<h2>MySite</h2>
<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Services</a>
<a href="#">Contact</a>
</nav>
</header>

<div class="hero">
<div>
<h1>Welcome to My Website</h1>
<p>Modern • Clean • Professional</p>
</div>
</div>

<section>
<h2>About Me</h2>
<p>
ここに自己紹介を書きます。  
Web開発、デザイン、AIなど自分のスキルを書けます。
</p>
</section>

<section>
<h2>Services</h2>

<div class="services">

<div class="card">
<h3>Web Design</h3>
<p>モダンなWEBサイトを作ります。</p>
</div>

<div class="card">
<h3>Development</h3>
<p>HTML / CSS / JavaScriptで開発。</p>
</div>

<div class="card">
<h3>AI Tools</h3>
<p>AIを使ったサービス開発。</p>
</div>

</div>
</section>

<footer>
<p>© 2026 My Website</p>
</footer>

</body>
</html>
